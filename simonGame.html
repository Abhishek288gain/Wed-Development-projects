<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="simonGame.css">
</head>
<body>
    <h1>Simon Game</h1>
    <h2>Press any key for Start the game</h2>
    <div class="main-container">
        <div class="line-one">
            <div class="btn red" type="button" id="red">1</div>
            <div class="btn purple" type="Button" id="purple">2</div>
        </div>
        <div class="line-tow">
            <div class="btn yellow" type="button" id="yellow">3</div>
            <div class="btn green" type="Button" id="green">4</div>
        </div>
    </div>
    <script src="simonGame.js"></script>
</body>
</html>
